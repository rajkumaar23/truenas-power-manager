<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace">
  <!-- Background -->
  <rect width="720" height="280" fill="#0d1117" rx="12"/>

  <!-- Source network zone -->
  <rect x="20" y="20" width="320" height="240" fill="#161b22" rx="8" stroke="#30363d" stroke-width="1"/>
  <text x="180" y="45" text-anchor="middle" fill="#8b949e" font-size="11">source network</text>

  <!-- Backup network zone -->
  <rect x="380" y="20" width="320" height="240" fill="#161b22" rx="8" stroke="#30363d" stroke-width="1"/>
  <text x="540" y="45" text-anchor="middle" fill="#8b949e" font-size="11">backup network</text>

  <!-- Source TrueNAS box -->
  <rect x="40" y="70" width="150" height="60" fill="#1f2937" rx="6" stroke="#374151" stroke-width="1"/>
  <text x="115" y="97" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">source TrueNAS</text>
  <text x="115" y="115" text-anchor="middle" fill="#8b949e" font-size="10">replication source</text>

  <!-- truenas-power-manager box -->
  <rect x="40" y="175" width="280" height="65" fill="#0f2c1f" rx="6" stroke="#238636" stroke-width="1.5"/>
  <text x="180" y="200" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600">truenas-power-manager</text>
  <text x="180" y="217" text-anchor="middle" fill="#56d364" font-size="10">macvlan · source LAN</text>
  <text x="180" y="232" text-anchor="middle" fill="#56d364" font-size="10">+ WireGuard tunnel</text>

  <!-- Backup TrueNAS box -->
  <rect x="530" y="70" width="150" height="60" fill="#1f2937" rx="6" stroke="#374151" stroke-width="1"/>
  <text x="605" y="97" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">backup TrueNAS</text>
  <text x="605" y="115" text-anchor="middle" fill="#8b949e" font-size="10">replication target</text>

  <!-- IPMI label inside backup TrueNAS -->
  <rect x="555" y="150" width="100" height="28" fill="#1c2a3a" rx="4" stroke="#1d4ed8" stroke-width="1"/>
  <text x="605" y="169" text-anchor="middle" fill="#60a5fa" font-size="11">IPMI interface</text>

  <!-- SSH arrow: source TrueNAS → power-manager -->
  <line x1="115" y1="130" x2="115" y2="172" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="115,172 110,162 120,162" fill="#f0883e"/>
  <text x="120" y="155" fill="#f0883e" font-size="10">SSH</text>

  <!-- WireGuard tunnel line -->
  <line x1="322" y1="207" x2="550" y2="164" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="550,164 540,162 546,172" fill="#a371f7"/>

  <!-- WireGuard label -->
  <text x="430" y="178" text-anchor="middle" fill="#a371f7" font-size="10">WireGuard</text>

  <!-- IPMI → power arrow -->
  <line x1="605" y1="150" x2="605" y2="133" stroke="#60a5fa" stroke-width="1.5"/>
  <polygon points="605,133 600,143 610,143" fill="#60a5fa"/>
  <text x="620" y="145" fill="#60a5fa" font-size="10">power</text>
</svg>
